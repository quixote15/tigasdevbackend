<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <!-- Cache-Control: index.html nunca fica em cache (assets sao cacheados pelo hash do Vite) -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- SEO / Social -->
    <title>Zumbis de Brasilia</title>
    <meta name="description" content="Brasilia, 8 de janeiro de 2023. A nevoa verde subiu. Sobreviva." />
    <meta property="og:title" content="Zumbis de Brasilia" />
    <meta property="og:description" content="Brasilia, 8 de janeiro de 2023. A nevoa verde subiu. Sobreviva." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Previne scroll/zoom indesejado em mobile durante gameplay -->
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a0a;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }
      #root {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
